name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  STRGUARD_RELEASE_SEED_HEX: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
  RUST_TOOLCHAIN: 1.94.1
  ANDROID_NDK_VERSION: 27.2.12479018

jobs:
  quality:
    name: JDK ${{ matrix.java }} quality
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        java: [17, 21]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - name: Gradle quality and plugin validation
        run: >-
          bash ./gradlew :strguard-plugin:check :strguard-plugin:validatePlugins
          --stacktrace
      - name: Rust formatting, lint, and unit tests
        if: matrix.java == 21
        run: |
          cargo fmt --manifest-path native/strguard-runtime/Cargo.toml -- --check
          cargo clippy --manifest-path native/strguard-runtime/Cargo.toml --all-targets --locked -- -D warnings
          cargo test --manifest-path native/strguard-runtime/Cargo.toml --locked
          bash .github/scripts/verify-rust-performance.sh
      - name: Rust coverage gate
        if: matrix.java == 21
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --version 0.8.7 --locked
          cargo llvm-cov --manifest-path native/strguard-runtime/Cargo.toml --locked \
            --fail-under-functions 85 \
            --fail-under-lines 85 \
            --fail-under-regions 85
      - name: Rust dependency audit
        if: matrix.java == 21
        run: |
          cargo install cargo-audit --version 0.22.2 --locked
          cargo audit --file native/strguard-runtime/Cargo.lock
          cargo install cargo-deny --version 0.20.2 --locked
          cargo deny --manifest-path native/strguard-runtime/Cargo.toml check
      - name: Verify supported samples configure
        if: matrix.java == 17
        shell: bash
        run: |
          for sample in \
            java \
            java-library \
            application \
            kotlin-jvm \
            android-application \
            android-library \
            kotlin-android-application \
            kotlin-multiplatform
          do
            bash ./gradlew -p "samples/${sample}" help --stacktrace
          done

  desktop-native:
    name: ${{ matrix.name }} Native runtime
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            gradle: bash ./gradlew
          - name: Linux arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            gradle: bash ./gradlew
          - name: Windows x64
            os: windows-2025
            target: x86_64-pc-windows-msvc
            gradle: .\gradlew.bat
          - name: Windows arm64
            os: windows-11-vs2026-arm
            target: aarch64-pc-windows-msvc
            gradle: .\gradlew.bat
          - name: macOS x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            gradle: bash ./gradlew
          - name: macOS arm64
            os: macos-15
            target: aarch64-apple-darwin
            gradle: bash ./gradlew
    env:
      STRGUARD_TARGET_TRIPLE: ${{ matrix.target }}
      STRGUARD_COMPOSE_DISTRIBUTION_TEST: ${{ matrix.target == 'x86_64-unknown-linux-gnu' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - name: Compile, shrink, package, and load JNI runtime
        run: >-
          ${{ matrix.gradle }} :strguard-plugin:test
          --tests "io.github.weg2022.strguard.StrGuardPluginFunctionalTest"
          --tests "io.github.weg2022.strguard.JvmPluginCompatibilityTest"
          --tests "io.github.weg2022.strguard.KotlinMultiplatformPluginFunctionalTest"
          --tests "io.github.weg2022.strguard.DesktopShrinkerFunctionalTest"
          --stacktrace
      - name: Build and run public Desktop samples
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          bash ./gradlew -p samples/java build --stacktrace
          bash ./gradlew -p samples/java-library build --stacktrace
          bash ./gradlew -p samples/application run --stacktrace
          bash ./gradlew -p samples/kotlin-jvm run --stacktrace
          bash ./gradlew -p samples/kotlin-multiplatform jvmJar --stacktrace

  java11-runtime:
    name: Java 11 protected runtime
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 11
      - name: Save Java 11 runtime path
        shell: bash
        run: echo "STRGUARD_JAVA11_HOME=${JAVA_HOME}" >> "${GITHUB_ENV}"
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-unknown-linux-gnu
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - name: Build with JDK 21 and execute with JDK 11
        run: >-
          bash ./gradlew :strguard-plugin:test
          --tests "io.github.weg2022.strguard.Java11RuntimeFunctionalTest"
          --stacktrace

  android-native:
    name: Android 4 ABI packaging and R8
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      STRGUARD_ANDROID_NATIVE_TEST: "true"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
      - name: Install Android SDK and NDK
        run: >-
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
          "ndk;${ANDROID_NDK_VERSION}"
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: armv7-linux-androideabi,aarch64-linux-android,i686-linux-android,x86_64-linux-android
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - name: Build all ABIs and verify APK/AAR/R8 contracts
        run: >-
          bash ./gradlew :strguard-plugin:test
          --tests "io.github.weg2022.strguard.KotlinAndroidPluginFunctionalTest"
          --tests "io.github.weg2022.strguard.KotlinMultiplatformPluginFunctionalTest"
          --tests "io.github.weg2022.strguard.AndroidMultiModulePackagingFunctionalTest"
          --stacktrace
      - name: Build public Android samples and instrumentation APK
        shell: bash
        run: |
          bash ./gradlew -p samples/android-application assembleDebug --stacktrace
          bash ./gradlew -p samples/android-library assembleDebug --stacktrace
          bash ./gradlew -p samples/kotlin-android-application \
            assembleDebug assembleRelease assembleReleaseAndroidTest bundleRelease --stacktrace

  reproducibility:
    name: Reproducible protected artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-unknown-linux-gnu
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - name: Compare two clean checkouts byte for byte
        run: bash .github/scripts/verify-reproducible.sh
